apiVersion: apps/v1
kind: Deployment
metadata:
  name: plastic-api-deployment
  labels:
    app: plastic-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: plastic-api
  template:
    metadata:
      labels:
        app: plastic-api
    spec:
      containers:
      - name: plastic-api
        image: ynii0028/plastic-api:v9
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_PATH
          value: "model.pt"
        - name: CONF_THRESHOLD
          value: "0.25"
        - name: INFER_IMGSZ
          value: "128"
        - name: MAX_IMAGE_SIDE
          value: "192"
        - name: JPEG_QUALITY
          value: "85"
        - name: BATCH_MAX_SIZE
          value: "8"
        - name: BATCH_TIMEOUT_MS
          value: "10"
        - name: ANNOTATE_INFLIGHT
          value: "1"

        # Prevent CPU thread oversubscription inside a 1-vCPU pod
        - name: OMP_NUM_THREADS
          value: "1"
        - name: MKL_NUM_THREADS
          value: "1"
        - name: OPENBLAS_NUM_THREADS
          value: "1"
        - name: NUMEXPR_NUM_THREADS
          value: "1"
        - name: OPENCV_NUM_THREADS
          value: "1"

        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "1"
            memory: "2Gi"

        startupProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 24

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: plastic-api-service
  labels:
    app: plastic-api
spec:
  type: NodePort
  selector:
    app: plastic-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
    nodePort: 30001
