apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: plastic-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: plastic-api-deployment # 必须指向你的 Deployment 名字
  minReplicas: 2  # 空闲时保留 2 个
  maxReplicas: 8  # 压力大时最多扩展到 8 个
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50

