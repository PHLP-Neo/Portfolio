{% extends "encyclopedia/layout.html" %}

{% block title %}
Encyclopedia
{% endblock %}

{% block body %}
<h1>Result for "{{query}}"</h1>

<ul>
    {% for entry in result %}
    <li>
        <a href="{% url 'encyclopedia:show_entries' entry %}">{{ entry }}</a>
    </li>
    {% endfor %}
</ul>

{% endblock %}
