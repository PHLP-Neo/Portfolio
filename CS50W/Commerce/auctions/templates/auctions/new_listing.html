{% extends "auctions/layout.html" %}

{% block body %}
<h2>Add a new listing</h2>

{% if message %}
<div>{{ message }}</div>
{% endif %}

<form action="{% url 'new_listing' %}" method="post">
    {% csrf_token %}
    <div class="form-group">
        <input autofocus class="form-control" type="text" name="Name" placeholder="Item Name" required>
    </div>
    <div class="form-group">
        <input autofocus class="form-control" type="number" name="Starting_Bid" placeholder="Starting_Bid" required>
    </div>
    <div class="form-group">
        <input autofocus class="form-control" type="text" name="Lis_Image" placeholder="Listing Image(URL)">
    </div>
    <div class="form-group">
        <input autofocus class="form-control" type="text" name="Category" placeholder="Category">
    </div>
    <div class="form-group">
        <textarea autofocus class="form-control" type="textarea" rows="10" name="Desc" placeholder="Item Description" required></textarea>
    </div>
    <div>
        <input class="btn btn-primary" type="submit" value="Submit">
    </div>
</form>

{% endblock %}
